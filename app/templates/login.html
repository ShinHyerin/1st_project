{% extends 'base.html' %}

{% block title %}로그인 - Namedly{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">환영합니다</h1>
            <p class="login-subtitle">이름과 생년월일을 입력하여 로그인을 완료하세요.</p>
        </div>

        <form action="{{ url_for('login') }}" method="post" class="login-form">
            <div class="form-group">
                <label for="user_name" class="form-label">이름</label>
                <input type="text" id="user_name" name="user_name" placeholder="성함을 입력하세요" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="birth_date" class="form-label">생년월일</label>
                <input type="text" id="birth_date" name="birth_date" placeholder="YYYYMMDD (8자리)" maxlength="8" class="form-input" required>
            </div>

            <button type="submit" class="login-submit-btn">로그인하기</button>
        </form>

<!--        <div class="login-footer">-->
<!--            <p>도움이 필요하신가요? <a href="#">고객센터 문의</a></p>-->
<!--        </div>-->
    </div>
</div>
{% endblock %}
