<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Namedly - AI 건강 관리 리포트</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-white text-gray-800">

    <nav class="flex items-center justify-between px-10 py-6 border-b border-gray-100">
        <div class="flex items-center space-x-8">
            <div class="font-bold text-2xl flex items-center cursor-pointer" onclick="location.href='/'">
                <span class="mr-2">❈</span> Namedly
            </div>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-500">
                <a href="#" class="hover:text-black">Features</a>
                <a href="#" class="hover:text-black">Learn more</a>
                <a href="#" class="hover:text-black">Support</a>
            </div>
        </div>
        <button class="bg-black text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition">
            Login
        </button>
    </nav>

    <section class="py-20 px-10 max-w-7xl mx-auto">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-extrabold mb-2 text-black">Health Analysis</h2>
            <p class="text-gray-500 text-lg">상세한 건강 데이터를 입력하여 AI 맞춤형 리포트를 확인하세요.</p>
        </div>

        <form action="/predict" method="post" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">

            <div class="input-card">
                <h3 class="font-bold mb-6 flex items-center"><span class="text-orange-400 mr-2">●</span> 신체 정보</h3>
                <div class="space-y-5">
                    <div>
                        <label class="input-label">키</label>
                        <input type="number" step="0.1" name="height" placeholder="(cm)" class="input-field" required>
                    </div>
                    <div>
                        <label class="input-label">몸무게</label>
                        <input type="number" step="0.1" name="weight" placeholder="(kg)" class="input-field" required>
                    </div>
                </div>
            </div>


            <div class="input-card">
                <h3 class="font-bold mb-6 flex items-center"><span class="text-blue-400 mr-2">●</span> 활동 패턴</h3>
                <div class="space-y-5">
                    <div>
                        <label class="input-label">고강도 활동</label>
                        <input type="number" name="high_active" placeholder="(분)" class="input-field" required>
                    </div>
                    <div>
                        <label class="input-label">중강도 활동</label>
                        <input type="number" name="mid_active" placeholder="(분)" class="input-field" required>
                    </div>
                    <div>
                        <label class="input-label">앉아있는 시간</label>
                        <input type="number" name="sitting" placeholder="(분)" class="input-field" required>
                    </div>
                </div>
            </div>


            <div class="input-card">
                <h3 class="font-bold mb-6 flex items-center"><span class="text-green-400 mr-2">●</span> 영양 상태</h3>
                <div class="space-y-4">
                    <div>
                        <label class="input-label">하루 총 열량</label>
                        <input type="number" name="energy" placeholder="(kcal)" class="input-field" required>
                    </div>
                    <div>
                        <label class="input-label">하루 지방 섭취량</label>
                        <input type="number" step="0.1" name="fat" placeholder="(g)" class="input-field" required>
                    </div>
                    <div>
                        <label class="input-label">하루 나트륨 섭취량</label>
                        <input type="number" step="0.1" name="na" placeholder="(mg)" class="input-field" required>
                    </div>
                    <div>
                        <label class="input-label">하루 당류 섭취량</label>
                        <input type="number" step="0.1" name="sugar" placeholder="(g)" class="input-field" required>
                    </div>
                </div>
            </div>


            <div class="input-card">
                <h3 class="font-bold mb-6 flex items-center"><span class="text-purple-400 mr-2">●</span> 혈관 건강</h3>
                <div class="space-y-5">
                    <div>
                        <label class="input-label">LDL 콜레스테롤</label>
                        <input type="number" name="ldl" placeholder="(mg/dL)" class="input-field focus:border-purple-400" required>
                    </div>
                    <div>
                        <label class="input-label">HDL 콜레스테롤</label>
                        <input type="number" name="hdl" placeholder="(mg/dL)" class="input-field focus:border-purple-400" required>
                    </div>
                </div>
            </div>

            <div class="md:col-span-2 lg:col-span-4 mt-8">
                <button type="submit" class="submit-btn">
                    무료 건강 리포트 생성하기
                </button>
            </div>
        </form>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
