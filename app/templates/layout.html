<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Namedly - AI 건강 관리 리포트{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-white text-gray-800">

    <nav class="flex items-center justify-between px-10 py-6 border-b border-gray-100 bg-white">
        <div class="flex items-center space-x-8">
            <a href="/" class="font-bold text-2xl flex items-center">
                <span class="mr-2">❈</span> Namedly
            </a>
            <div class="hidden md:flex space-x-6 text-sm font-medium text-gray-500">
                <a href="#" class="hover:text-black">Features</a>
                <a href="#" class="hover:text-black">Learn more</a>
                <a href="#" class="hover:text-black">Support</a>
            </div>
        </div>
        <button class="bg-black text-white px-5 py-2 rounded-full text-sm font-medium hover:bg-gray-800 transition">
            Login
        </button>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="py-16 border-t border-gray-100 text-center">
        <p class="text-sm text-gray-400 mb-8 tracking-wide">Drop some names with confidence</p>
        <div class="flex flex-wrap justify-center items-center gap-12 opacity-30 grayscale filter">
            <span class="font-bold text-xl">Logoipsum</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
